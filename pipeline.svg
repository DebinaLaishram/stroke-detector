<svg width="680" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" role="img">
<title>StrokeDetector three-stage pipeline architecture</title>
<desc>Flowchart showing input DWI and ADC maps flowing through backbone and FPN, then through three sequential training stages, producing five clinical outputs</desc>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- INPUT -->
<rect x="200" y="20" width="280" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" x="340" y="47" text-anchor="middle">DWI (b=1000) + ADC maps</text>

<line x1="340" y1="64" x2="340" y2="88" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- BACKBONE + FPN -->
<rect x="140" y="88" width="400" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#26215C" x="340" y="112" text-anchor="middle">3D ResNet backbone + FPN</text>
<text font-family="Arial, sans-serif" font-size="12" fill="#3C3489" x="340" y="132" text-anchor="middle">0.504M params · P2–P5 features · shared across all stages</text>

<!-- Three arrows down -->
<line x1="210" y1="144" x2="150" y2="185" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="144" x2="340" y2="185" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="470" y1="144" x2="530" y2="185" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- STAGE 1 -->
<rect x="60" y="185" width="190" height="100" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#04342C" x="155" y="210" text-anchor="middle">Stage 1</text>
<text font-family="Arial, sans-serif" font-size="12" fill="#085041" x="155" y="228" text-anchor="middle">Segmentation pretraining</text>
<text font-family="Arial, sans-serif" font-size="12" fill="#085041" x="155" y="246" text-anchor="middle">SegDecoder on P2</text>
<text font-family="Arial, sans-serif" font-size="12" fill="#085041" x="155" y="264" text-anchor="middle">Loss: Dice + BCE</text>

<!-- STAGE 2 -->
<rect x="245" y="185" width="190" height="100" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#042C53" x="340" y="210" text-anchor="middle">Stage 2</text>
<text font-family="Arial, sans-serif" font-size="12" fill="#0C447C" x="340" y="228" text-anchor="middle">Detection fine-tuning</text>
<text font-family="Arial, sans-serif" font-size="12" fill="#0C447C" x="340" y="246" text-anchor="middle">YOLO heads P2–P5</text>
<text font-family="Arial, sans-serif" font-size="12" fill="#0C447C" x="340" y="264" text-anchor="middle">Loss: GIoU + L1 + BCE</text>

<!-- STAGE 3 -->
<rect x="430" y="185" width="190" height="100" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#412402" x="525" y="210" text-anchor="middle">Stage 3</text>
<text font-family="Arial, sans-serif" font-size="12" fill="#633806" x="525" y="228" text-anchor="middle">Presence head</text>
<text font-family="Arial, sans-serif" font-size="12" fill="#633806" x="525" y="246" text-anchor="middle">GlobalPresenceHead</text>
<text font-family="Arial, sans-serif" font-size="12" fill="#633806" x="525" y="264" text-anchor="middle">Loss: BCE</text>

<!-- Metrics below each stage -->
<text font-family="Arial, sans-serif" font-size="12" fill="#085041" x="155" y="302" text-anchor="middle">Val Dice = 0.578</text>
<text font-family="Arial, sans-serif" font-size="12" fill="#0C447C" x="340" y="302" text-anchor="middle">mAP = 0.798</text>
<text font-family="Arial, sans-serif" font-size="12" fill="#633806" x="525" y="302" text-anchor="middle">Spec: 0.0 → 0.200</text>

<!-- Intermediate output labels -->
<text font-family="Arial, sans-serif" font-size="12" fill="#085041" x="155" y="345" text-anchor="middle">seg mask</text>
<text font-family="Arial, sans-serif" font-size="12" fill="#0C447C" x="340" y="345" text-anchor="middle">bbox + subtype</text>
<text font-family="Arial, sans-serif" font-size="12" fill="#633806" x="525" y="345" text-anchor="middle">presence flag</text>

<!-- Arrows to intermediate labels -->
<line x1="155" y1="285" x2="155" y2="335" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="285" x2="340" y2="335" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="525" y1="285" x2="525" y2="335" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Converging lines to output box -->
<path d="M155 355 L155 420 L338 420" fill="none" stroke="#444441" stroke-width="1"/>
<path d="M340 355 L340 420" fill="none" stroke="#444441" stroke-width="1"/>
<path d="M525 355 L525 420 L342 420" fill="none" stroke="#444441" stroke-width="1"/>
<line x1="340" y1="420" x2="340" y2="438" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- OUTPUTS BOX -->
<rect x="120" y="440" width="440" height="110" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" x="340" y="464" text-anchor="middle">Five clinical outputs</text>
<text font-family="Arial, sans-serif" font-size="12" fill="#444441" x="340" y="484" text-anchor="middle">Presence flag · Bounding box · Subtype · Seg mask · Infarct volume (ml)</text>
<text font-family="Arial, sans-serif" font-size="12" fill="#444441" x="340" y="502" text-anchor="middle">All in native image space · JSON result · NIfTI masks</text>
<text font-family="Arial, sans-serif" font-size="12" fill="#444441" x="340" y="520" text-anchor="middle">Inference &lt; 10 s · T400 4 GB GPU · 0.504M parameters</text>
<text font-family="Arial, sans-serif" font-size="12" fill="#444441" x="340" y="538" text-anchor="middle">Sensitivity = 0.905 · Specificity = 0.200 · mAP = 0.798</text>

</svg>
